info:
  description: TaoAPI HTTP service.<br/><br/><b>Default API key (testing)</b><br/><b>glk-test-019d2a1c-5bc0-7171-bad9-5867c08a188f</b>
  title: TaoAPI
  version: "1.0"
openapi: 3.1.0
paths:
  /api/v1/event-stakes:
    get:
      description: 'Use this endpoint to query event-stake records for analytics and
        reconciliation use cases. Optional query filters are combined with AND semantics,
        so each additional parameter narrows the result set. Results are sorted by
        `orderField` and `orderType` (default: `timestamp desc`) and returned in 1-based
        pages. `timestampFrom` and `timestampTo` must be RFC3339 timestamps and are
        applied as inclusive time boundaries.'
      operationId: getEventStakesV1
      parameters:
      - description: Optional. Stake action filter.
        example: DELEGATE
        in: query
        name: action
        schema:
          enum:
          - DELEGATE
          - UNDELEGATE
          type: string
      - description: Optional. Exact chain block number to match.
        example: 5023411
        in: query
        name: blockNumber
        schema:
          type: integer
      - description: 'Optional. Delegate address in SS58 or hex format (for example:
          5GKH9FPPnWSUoeeTJp or 0xbc0e6b70124).'
        example: 5GKH9FPPnWSUoeeTJp
        in: query
        name: delegate
        schema:
          type: string
      - description: 'Optional. Nominator address in SS58 or hex format (for example:
          5GKH9FPPnWSUoeeTJp or 0xbc0e6b70124).'
        example: "0xbc0e6b70124"
        in: query
        name: nominator
        schema:
          type: string
      - description: Optional. Inclusive lower time boundary in RFC3339 format (2006-01-02T15:04:05Z07:00).
        example: "2025-01-01T00:00:00Z"
        in: query
        name: timestampFrom
        schema:
          type: string
      - description: Optional. Inclusive upper time boundary in RFC3339 format (2006-01-02T15:04:05Z07:00).
        example: "2025-01-31T23:59:59Z"
        in: query
        name: timestampTo
        schema:
          type: string
      - description: Optional. Subnet/network identifier.
        example: 1
        in: query
        name: netuid
        schema:
          default: 1
          type: integer
      - description: Optional. Exact extrinsic hash filter.
        example: 0x8f84ca9b49a1f9d8a4f6d9f6d6fdbbc8b0b5c760c8a0d1122334455667788990
        in: query
        name: extrinsicHash
        schema:
          type: string
      - description: Optional. 1-based page index.
        example: 1
        in: query
        name: page
        schema:
          default: 1
          minimum: 1
          type: integer
      - description: Optional. Number of records per page (recommended 20-100).
        example: 20
        in: query
        name: pageSize
        schema:
          default: 20
          maximum: 200
          minimum: 1
          type: integer
      - description: Optional. Primary sort field.
        example: timestamp
        in: query
        name: orderField
        schema:
          default: timestamp
          enum:
          - timestamp
          - blockNumber
          type: string
      - description: Optional. Sort direction.
        example: desc
        in: query
        name: orderType
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.EventStakeQueryAPIResponse'
          description: Successfully returns a filtered, sorted, paginated event-stake
            list.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Invalid request parameters, such as non-numeric values, unsupported
            enum values, invalid RFC3339 timestamps, or pagination values outside
            allowed bounds.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Authentication failed because `glk_api` is missing or invalid.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Internal server error while validating input or querying storage.
      security:
      - ApiKeyAuth: []
      summary: Retrieve paginated event-stake records with composable filters
      tags:
      - event-stake
  /api/v1/stake-infos:
    get:
      description: Returns the latest stake positions for the provided cold key address.
        The `coldKey` parameter accepts either SS58 or 0x-prefixed 32-byte hex public
        key format. Returned `hotKey` and `coldKey` are normalized to SS58 strings.
        The response includes an aggregated `totalStakeByNetuid` map where stake values
        are summed by `netuid` across all hotkeys. This endpoint is intended for real-time
        balance lookup. For Scalar testing, set `glk_api` in the Authentication panel
        to `glk-test-019d2a1c-5bc0-7171-bad9-5867c08a188f`.
      operationId: getStakeInfosV1
      parameters:
      - description: Required. Cold key in SS58 or 0x-prefixed 32-byte hex public
          key format.
        example: 5GgMXDVL3ZSnUhWzZuySXWSuBemDCCHNiLwx8RXpkKj6TkRi
        in: query
        name: coldKey
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.StakeInfoQueryAPIResponse'
          description: Successfully returns stake positions and per-netuid total stake.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Invalid request parameters, such as missing `coldKey` or malformed
            SS58/hex cold key.
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Authentication failed because `glk_api` is missing or invalid.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.APIErrorResponse'
          description: Internal server error while calling runtime API or decoding
            runtime response.
      security:
      - ApiKeyAuth: []
      summary: Retrieve real-time stake balances for a cold key
      tags:
      - stake-info
servers:
- description: Tao api server.
  url: https://taoapi.chillybot.xyz
