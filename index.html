      rel="alternate"

      title="LLMs index"

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TaoAPI Docs" />
    <meta
      property="og:title"
      content="TaoAPI Docs | Bittensor On-Chain Analytics API Reference"

      content="Official TaoAPI reference for Bittensor on-chain transaction and staking analytics across subnets."

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:title"

      content="Official TaoAPI reference for Bittensor on-chain transaction and staking analytics across subnets."
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TaoAPI Docs",
        "url": "https://taoapi-doc.chillybot.xyz/",
        "description": "Official TaoAPI API reference for Bittensor on-chain analytics and subnet participant transaction data."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TechArticle",
        "headline": "TaoAPI Bittensor On-Chain Analytics OpenAPI Reference",
        "name": "TaoAPI Bittensor On-Chain Analytics OpenAPI Reference",
        "about": [
          "API",
          "OpenAPI",
          "Swagger",
          "TaoAPI",
          "Bittensor",
          "TAO",
          "On-Chain Analytics",
          "Subnets"
        ],
        "url": "https://taoapi-doc.chillybot.xyz/"
      }
    </script>
  </head>
  <body>
    <noscript>
      TaoAPI documentation for Bittensor on-chain analytics requires JavaScript
      to render the interactive API reference. You can directly access the
      OpenAPI file at <a href="/swagger.yaml">/swagger.yaml</a> and AI index at
      <a href="/llms.txt">/llms.txt</a>.
    </noscript>

    <div id="app"></div>

    <!-- Load Scalar -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <!-- Initialize Scalar API Reference -->
    <script>
      Scalar.createApiReference("#app", {
        url: "./swagger.yaml",

        // GEO/AI-search friendly: expose explicit metadata from Scalar runtime as well
        metaData: {
          title: "TaoAPI Docs | Bittensor On-Chain Analytics API Reference",
          description:
            "Official TaoAPI API reference for Bittensor on-chain analytics, including subnet transaction and staking/delegation event data.",
          ogTitle: "TaoAPI Docs | Bittensor On-Chain Analytics API Reference",
          ogDescription:
            "Official TaoAPI reference for Bittensor on-chain transaction and staking analytics across subnets.",
        },

        // Keep routes stable and predictable for citations/deep links
        generateTagSlug: (tag) =>
          String(tag.name || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, ""),
        generateOperationSlug: (operation) =>
          `${String(operation.method || "get").toLowerCase()}-${String(
            operation.path || "",
          )
            .toLowerCase()
            .replace(/[^a-z0-9/]+/g, "")
            .replaceAll("/", "-")
            .replace(/^-+|-+$/g, "")}`,
        generateModelSlug: (model) =>
          String(model.name || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, ""),

        // Improve discoverability and consistency
        operationTitleSource: "summary",
        showOperationId: true,
        tagsSorter: "alpha",
        operationsSorter: "alpha",

        // Keep raw spec easy to fetch/cite
        documentDownloadType: "json",

        // UX defaults
        defaultOpenFirstTag: true,
        orderRequiredPropertiesFirst: true,
        orderSchemaPropertiesBy: "alpha",
      });
    </script>
  </body>
</html>
